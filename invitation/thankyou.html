<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Tarun & Deepali's Wedding</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
    <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Dancing+Script&amp;display=swap'>
</head>
<body>
    <img src="../assets/img/left.png" alt="flowers left" class="top-left-decoration">
    <img src="../assets/img/right.png" alt="flowers right" class="top-right-decoration">
    
    <div class="thankyou-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px;">
        <div class="card-box" style="padding: 50px 40px; max-width: 600px;">
            <h1 class="section-title" style="font-size: 3em; margin-bottom: 20px;">Thank You!</h1>
            
            <div class="heart-icon" style="font-size: 4em; margin: 20px 0;">&#10084;&#65039;</div>
            
            <p style="font-family: 'Arvo', serif; font-size: 1.2em; color: #7a5c4d; line-height: 1.6; margin-bottom: 30px;">
                Thank you for visiting our wedding invitation.<br>
                Your presence and blessings mean the world to us!
            </p>
            
            <div class="couple-names" style="margin: 30px 0;">
                <h2 class="heading-pink" style="font-size: 2em;">Tarun Mahor</h2>
                <p class="text-accent" style="font-size: 1.5em; margin: 10px 0;">&</p>
                <h2 class="heading-pink" style="font-size: 2em;">Deepali Rajwaniya</h2>
            </div>
            
            <p class="text-dancing text-accent" style="font-size: 1.3em; margin-top: 30px;">
                We can't wait to celebrate with you!<br>
                See you on 25th April 2026
            </p>
            
            <a href="../index.html" class="btn-primary" style="margin-top: 30px;">Back to Home</a>
        </div>
    </div>
    
    <div class="music">
        <audio src="../assets/mp3/song.mp3" id="my_audio" loop="loop"></audio>
    </div>
    <script src="../js/continuous-audio.js"></script>
</body>
</html>
